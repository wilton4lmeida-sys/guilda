// ── CUSTOM CALENDAR ──
(function(){
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let state = { month:0, year:0, inputId:null, displayId:null };
  let rng = { active:false, fromId:null, toId:null, dispId:null, step:'start', hover:null };
  let el = null, grid = null, hint = null;

  function build() {
    if (el) return;
    el = document.createElement('div');
    el.id = 'customCal';
    el.innerHTML = `<div class="cal-popup">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev(event)">&#8249;</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button class="cal-nav" onclick="calNext(event)">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-range-hint" id="calRangeHint" style="display:none"></div>
    </div>`;
    document.body.appendChild(el);
    grid = el.querySelector('#calGrid');
    hint = el.querySelector('#calRangeHint');

    // Event delegation — no inline handlers that cause re-render loops
    grid.addEventListener('click', function(e) {
      const day = e.target.closest('[data-iso]');
      if (!day) return;
      e.stopPropagation();
      calPick(day.dataset.iso);
    });
    grid.addEventListener('mouseover', function(e) {
      if (!rng.active || rng.step !== 'end') return;
      const day = e.target.closest('[data-iso]');
      const iso = day ? day.dataset.iso : null;
      if (iso === rng.hover) return;
      rng.hover = iso;
      applyClasses();
    });
    grid.addEventListener('mouseleave', function() {
      if (!rng.active || rng.step !== 'end') return;
      rng.hover = null;
      applyClasses();
    });

    document.addEventListener('click', function(e){
      if (el.style.display !== 'none' && !el.contains(e.target) && !e.target.closest('.date-picker-wrap')) {
        el.style.display = 'none';
        rng.active = false;
      }
    }, true);
  }

  function position(trigger) {
    const rect = trigger.getBoundingClientRect();
    el.style.display = 'block';
    el.style.top = (rect.bottom + 6) + 'px';
    el.style.left = rect.left + 'px';
    requestAnimationFrame(() => {
      const er = el.getBoundingClientRect();
      if (er.right > window.innerWidth - 8) el.style.left = (window.innerWidth - er.width - 8) + 'px';
    });
  }

  window.openCal = function(inputId, displayId, trigger, ev) {
    if (ev) ev.stopPropagation();
    build();
    rng.active = false;
    state.inputId = inputId;
    state.displayId = displayId;
    const inp = document.getElementById(inputId);
    if (inp && inp.value) { const [y,m] = inp.value.split('-'); state.year=+y; state.month=+m-1; }
    else { const n = new Date(); state.month=n.getMonth(); state.year=n.getFullYear(); }
    position(trigger);
    renderCal();
  };

  window.openCalRange = function(fromId, toId, dispId, trigger, ev) {
    if (ev) ev.stopPropagation();
    build();
    rng = { active:true, fromId, toId, dispId, step:'start', hover:null };
    const fromInp = document.getElementById(fromId);
    if (fromInp && fromInp.value) { const [y,m] = fromInp.value.split('-'); state.year=+y; state.month=+m-1; }
    else { const n = new Date(); state.month=n.getMonth(); state.year=n.getFullYear(); }
    position(trigger);
    renderCal();
  };

  window.calPrev = function(ev) { if(ev) ev.stopPropagation(); state.month--; if(state.month<0){state.month=11;state.year--;} renderCal(); };
  window.calNext = function(ev) { if(ev) ev.stopPropagation(); state.month++; if(state.month>11){state.month=0;state.year++;} renderCal(); };

  // Build DOM once; applyClasses() updates styles without rebuilding
  function renderCal() {
    document.getElementById('calMonthLabel').textContent = MONTHS[state.month] + ' ' + state.year;
    const first = new Date(state.year, state.month, 1).getDay();
    const total = new Date(state.year, state.month+1, 0).getDate();
    const prevTotal = new Date(state.year, state.month, 0).getDate();
    let h = DAYS.map(d => `<div class="cal-day-name">${d}</div>`).join('');
    for (let i = first-1; i >= 0; i--) h += `<div class="cal-day other-month">${prevTotal-i}</div>`;
    for (let d = 1; d <= total; d++) {
      const iso = state.year+'-'+String(state.month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      h += `<div class="cal-day" data-iso="${iso}">${d}</div>`;
    }
    const rem = (7-((first+total)%7))%7;
    for (let d = 1; d <= rem; d++) h += `<div class="cal-day other-month">${d}</div>`;
    grid.innerHTML = h;
    applyClasses();
    if (rng.active) {
      hint.style.display = 'block';
      hint.textContent = rng.step === 'start' ? 'Selecione o início do período' : 'Selecione o fim do período';
    } else { hint.style.display = 'none'; }
  }

  function applyClasses() {
    const today = new Date().toISOString().split('T')[0];
    const fromVal = rng.active ? (document.getElementById(rng.fromId)?.value||'') : (document.getElementById(state.inputId)?.value||'');
    const toVal   = rng.active ? (document.getElementById(rng.toId)?.value||'') : '';
    const effTo   = rng.active && rng.step==='end' && rng.hover ? rng.hover : toVal;
    grid.querySelectorAll('[data-iso]').forEach(cell => {
      const iso = cell.dataset.iso;
      cell.className = 'cal-day';
      if (iso === today) cell.classList.add('today');
      if (rng.active) {
        if (iso === fromVal)                                      cell.classList.add('range-start');
        else if (effTo && iso === effTo)                          cell.classList.add('range-end');
        else if (fromVal && effTo && iso > fromVal && iso < effTo) cell.classList.add('in-range');
      } else {
        if (iso === fromVal) cell.classList.add('selected');
      }
    });
  }

  function calPick(iso) {
    if (rng.active) {
      if (rng.step === 'start') {
        document.getElementById(rng.fromId).value = iso;
        document.getElementById(rng.toId).value = '';
        rng.step = 'end'; rng.hover = null;
        hint.textContent = 'Selecione o fim do período';
        applyClasses();
      } else {
        const fromISO = document.getElementById(rng.fromId)?.value || iso;
        const [s, e] = iso < fromISO ? [iso, fromISO] : [fromISO, iso];
        document.getElementById(rng.fromId).value = s;
        document.getElementById(rng.toId).value   = e;
        const disp = document.getElementById(rng.dispId);
        if (disp) disp.textContent = s.split('-').reverse().join('/') + ' – ' + e.split('-').reverse().join('/');
        el.style.display = 'none';
        rng.active = false;
        if (rng.fromId === 'metricasFrom') loadMetricas();
        else if (rng.fromId === 'dashFunilFrom') renderFunilDash();
      }
    } else {
      const inp  = document.getElementById(state.inputId);
      const disp = document.getElementById(state.displayId);
      if (inp)  inp.value = iso;
      if (disp) disp.textContent = iso.split('-').reverse().join('/');
      el.style.display = 'none';
    }
  }
})();

// ── Google Drive Upload ──
const DRIVE_MAX_FILES = 15;
const DRIVE_MAX_SIZE = 20 * 1024 * 1024; // 20MB
const DRIVE_AUDIO_EXT = ['.mp3', '.wav', '.m4a', '.ogg', '.webm', '.aac', '.flac'];
let driveSelectedFiles = [];

function driveFileKey(file) {
  return `${file.name}::${file.size}::${file.lastModified}`;
}

function renderDriveFiles() {
  const emptyState = document.getElementById('driveEmptyState');
  const listEl = document.getElementById('driveFileList');
  const footer = document.getElementById('driveZoneFooter');
  const nameEl = document.getElementById('driveFileName');
  const btn = document.getElementById('driveUploadBtn');

  if (!driveSelectedFiles.length) {
    if (listEl) { listEl.innerHTML = ''; listEl.style.display = 'none'; }
    if (footer) footer.style.display = 'none';
    if (nameEl) nameEl.textContent = '';
    if (emptyState) emptyState.style.display = 'block';
    if (btn) {
      btn.disabled = true;
      btn.style.opacity = '.35';
      btn.style.cursor = 'not-allowed';
    }
    return;
  }

  const totalSize = driveSelectedFiles.reduce((sum, f) => sum + f.size, 0);
  if (nameEl) nameEl.textContent = `${driveSelectedFiles.length} arquivo(s) • ${(totalSize / 1024 / 1024).toFixed(2)} MB`;

  if (listEl) {
    listEl.innerHTML = driveSelectedFiles.map((f) => {
      const size = (f.size / 1024 / 1024).toFixed(2);
      const key = encodeURIComponent(driveFileKey(f));
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid rgba(245,197,24,.08)">
        <span style="width:6px;height:6px;border-radius:50%;background:rgba(245,197,24,.6)"></span>
        <span style="font-size:.78rem;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(f.name)}</span>
        <span style="font-size:.72rem;color:var(--t3)">${size} MB</span>
        <button type="button" onclick="removeDriveFile('${key}')" style="font-size:.72rem;color:#F87171;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:6px;padding:4px 8px;cursor:pointer">Excluir</button>
      </div>`;
    }).join('');
    listEl.style.display = 'flex';
  }

  if (emptyState) emptyState.style.display = 'none';
  if (footer) footer.style.display = 'flex';

  if (btn) {
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
  }
  const resultEl = document.getElementById('driveResult');
  if (resultEl) resultEl.style.display = 'none';
}

window.removeDriveFile = function(encodedKey) {
  const key = decodeURIComponent(encodedKey || '');
  driveSelectedFiles = driveSelectedFiles.filter((f) => driveFileKey(f) !== key);
  if (!driveSelectedFiles.length) {
    clearDriveFiles();
    return;
  }
  renderDriveFiles();
};


function initDriveDropZone() {
  const dz = document.getElementById('driveDropZone');
  if (!dz) return;
  dz.style.cursor = 'pointer';
  dz.addEventListener('click', (e) => {
    const target = e.target;
    if (target && (target.closest('button') || target.closest('a'))) return;
    openDrivePicker();
  });
}

window.handleDriveFiles = function(fileList, append = true) {
  if (!fileList || !fileList.length) return;

  const incoming = Array.from(fileList);

  const invalidType = incoming.filter((f) => !isAudioFile(f));
  const oversized = incoming.filter((f) => f.size > DRIVE_MAX_SIZE);

  let valid = incoming.filter((f) => isAudioFile(f) && f.size <= DRIVE_MAX_SIZE);
  if (invalidType.length) showDriveError('Apenas arquivos de áudio são permitidos.');
  if (oversized.length) showDriveError('Cada arquivo deve ter no máximo 20MB.');
  if (!valid.length) return;

  let combined = append ? [...driveSelectedFiles, ...valid] : [...valid];

  const unique = new Map();
  combined.forEach((f) => unique.set(driveFileKey(f), f));
  combined = Array.from(unique.values());

  if (combined.length > DRIVE_MAX_FILES) {
    showDriveError('Limite excedido: máximo de 15 arquivos por envio.');
    combined = combined.slice(0, DRIVE_MAX_FILES);
  }

  driveSelectedFiles = combined;
  renderDriveFiles();
};

window.clearDriveFiles = function() {
  driveSelectedFiles = [];
  const input = document.getElementById('driveFileInput');
  if (input) input.value = '';

  const emptyState = document.getElementById('driveEmptyState');
  const listEl = document.getElementById('driveFileList');
  const footer = document.getElementById('driveZoneFooter');
  const nameEl = document.getElementById('driveFileName');

  if (listEl) { listEl.innerHTML = ''; listEl.style.display = 'none'; }
  if (footer) footer.style.display = 'none';
  if (nameEl) nameEl.textContent = '';
  if (emptyState) emptyState.style.display = 'block';

  const btn = document.getElementById('driveUploadBtn');
  btn.disabled = true;
  btn.style.opacity = '.35';
  btn.style.cursor = 'not-allowed';
  document.getElementById('driveResult').style.display = 'none';
};

window.uploadToDrive = async function() {
  if (!driveSelectedFiles.length) return;

  const btn = document.getElementById('driveUploadBtn');
  const progWrap = document.getElementById('driveProgressWrap');
  const progBar = document.getElementById('driveProgressBar');
  const progPct = document.getElementById('driveProgressPct');
  const resultEl = document.getElementById('driveResult');

  btn.disabled = true;
  btn.textContent = 'Enviando...';
  if (progWrap) progWrap.style.display = 'block';
  if (progBar) progBar.style.width = '0%';
  if (progPct) progPct.textContent = '0%';
  resultEl.style.display = 'none';

  try {
    const tokenRes = await fetch('/api/drive-token');
    const tokenText = await tokenRes.text();
    let tokenData;
    try { tokenData = JSON.parse(tokenText); }
    catch { throw new Error(`Resposta inesperada (${tokenRes.status}): ${tokenText.slice(0, 200)}`); }

    if (!tokenRes.ok) throw new Error(tokenData.error || 'Falha ao obter token');

    const accessToken = tokenData.access_token;
    const folderId = tokenData.folder_id;

    let uploadedLinks = [];
    let pct = 0;
    const interval = setInterval(() => {
      pct = Math.min(pct + Math.random() * 12, 90);
      if (progBar) progBar.style.width = pct + '%';
      if (progPct) progPct.textContent = Math.round(pct) + '%';
    }, 300);

    for (const file of driveSelectedFiles) {
      const createRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&fields=id,webViewLink', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json; charset=UTF-8'
        },
        body: JSON.stringify({
          name: `[${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}] ${userProfile?.name || 'Membro'} - ${file.name}`,
          parents: [folderId]
        })
      });

      const uploadUrl = createRes.headers.get('location');
      if (!uploadUrl) throw new Error('Falha ao iniciar upload resumível');

      const uploadRes = await fetch(uploadUrl, {
        method: 'PUT',
        headers: {
          'Content-Type': file.type || 'application/octet-stream'
        },
        body: file
      });

      if (!uploadRes.ok) {
        const errText = await uploadRes.text();
        throw new Error(`Falha ao enviar arquivo: ${errText.slice(0, 200)}`);
      }

      const uploaded = await uploadRes.json();
      if (uploaded.webViewLink) {
        uploadedLinks.push({ fileName: file.name, link: uploaded.webViewLink });
      }
    }

    clearInterval(interval);
    if (progBar) progBar.style.width = '100%';
    if (progPct) progPct.textContent = '100%';

    resultEl.style.cssText = 'display:block;margin-bottom:14px;padding:12px 14px;border-radius:10px;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2)';
    const links = uploadedLinks.map((f) => {
      const label = escapeHtml(f.fileName || 'Arquivo');
      return `<div><a href="${f.link}" target="_blank" rel="noopener" style="color:#22C55E;font-weight:700;text-decoration:underline">${label}</a></div>`;
    }).join('');
    resultEl.innerHTML = `<div style="font-size:.82rem;font-weight:700;color:#34D399">✓ Arquivos enviados com sucesso</div>${links}`;
    clearDriveFiles();
  } catch (err) {
    resultEl.style.cssText = 'display:block;margin-bottom:14px;padding:12px 14px;border-radius:10px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2)';
    resultEl.innerHTML = `<div style="font-size:.82rem;font-weight:700;color:#EF4444">✕ Erro ao enviar</div><div style="font-size:.75rem;color:#F87171;margin-top:3px">${err.message}</div>`;
  } finally {
    setTimeout(() => { if (progWrap) progWrap.style.display = 'none'; if (progBar) progBar.style.width = '0%'; }, 1500);
    btn.disabled = false;
    btn.textContent = 'Enviar';
    btn.style.opacity = driveSelectedFiles.length ? '1' : '.35';
  }
};

function isAudioFile(file) {
  if (file.type && file.type.startsWith('audio/')) return true;
  const lower = (file.name || '').toLowerCase();
  return DRIVE_AUDIO_EXT.some((ext) => lower.endsWith(ext));
}

function showDriveError(message) {
  const resultEl = document.getElementById('driveResult');
  resultEl.style.display = 'block';
  resultEl.style.background = 'rgba(239,68,68,.08)';
  resultEl.style.border = '1px solid rgba(239,68,68,.2)';
  resultEl.style.color = '#EF4444';
  resultEl.textContent = message;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

window.salvarDiario = async () => {
  const date = document.getElementById('diarioData').value;
  const contatos = parseInt(document.getElementById('diarioContatos').value) || 0;
  const atendidas = parseInt(document.getElementById('diarioAtendidas').value) || 0;
  const decisores = parseInt(document.getElementById('diarioDecisores').value) || 0;
  const reunioes = parseInt(document.getElementById('diarioReunioes').value) || 0;
  const reunioesSql = parseInt(document.getElementById('diarioReunioesSql')?.value) || 0;
  const realizadas = parseInt(document.getElementById('diarioRealizadas')?.value) || 0;
  const realizadasSql = parseInt(document.getElementById('diarioRealizadasSql')?.value) || 0;
  const remarcadas = parseInt(document.getElementById('diarioRemarcadas')?.value) || 0;
  const noShow = parseInt(document.getElementById('diarioNoShow')?.value) || 0;
  if (!date) return alert('Selecione uma data');

  const statusEl = document.getElementById('diarioStatus');
  const showStatus = (text, kind = 'success') => {
    if (!statusEl) return;
    statusEl.style.display = 'block';
    if (kind === 'error') {
      statusEl.style.color = '#F87171';
      statusEl.style.background = 'rgba(248,113,113,.12)';
      statusEl.style.border = '1px solid rgba(248,113,113,.35)';
    } else if (kind === 'warn') {
      statusEl.style.color = '#F5C518';
      statusEl.style.background = 'rgba(245,197,24,.12)';
      statusEl.style.border = '1px solid rgba(245,197,24,.35)';
    } else {
      statusEl.style.color = '#16A34A';
      statusEl.style.background = 'rgba(34,197,94,.16)';
      statusEl.style.border = '1px solid rgba(34,197,94,.45)';
    }
    statusEl.textContent = text;
    clearTimeout(window.__diarioStatusTimer);
    window.__diarioStatusTimer = setTimeout(() => {
      statusEl.style.display = 'none';
    }, 3000);
  };

  const { data: existing, error: checkErr } = await sb
    .from('diary_entries')
    .select('id')
    .eq('user_id', userSession.user.id)
    .eq('date', date)
    .limit(1);
  if (checkErr) {
    showStatus('Erro ao validar envio', 'error');
    return;
  }
  if (existing && existing.length) {
    showStatus('Você já enviou as métricas deste dia.', 'warn');
    return;
  }

  const { error } = await sb.from('diary_entries').insert({
    user_id: userSession.user.id, date,
    contatos_tentados: contatos, ligacoes_atendidas: atendidas,
    conexao_decisor: decisores, reunioes_marcadas: reunioes,
    reunioes_marcadas_sql: reunioesSql, reunioes_realizadas: realizadas,
    reunioes_realizadas_sql: realizadasSql, reunioes_remarcadas: remarcadas,
    no_show: noShow
  });
  if (error) {
    if (error.code === '23505') {
      showStatus('Você já enviou as métricas deste dia.', 'warn');
      return;
    }
    return alert('Erro: ' + error.message);
  }

  let sheetFailed = false;
  try {
    const resp = await fetch('/api/diary-sheet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        date,
        user_id: userSession.user.id,
        user_name: userProfile?.name || '',
        user_email: userSession.user.email || '',
        metrics: {
          ligacoes_totais: contatos,
          conexoes: atendidas,
          conexoes_decisor: decisores,
          reunioes_marcadas: reunioes,
          reunioes_marcadas_sql: reunioesSql,
          reunioes_realizadas: realizadas,
          reunioes_realizadas_sql: realizadasSql,
          reunioes_remarcadas: remarcadas,
          no_show: noShow,
        }
      })
    });
    if (!resp.ok) {
      sheetFailed = true;
    }
  } catch (e) {
    sheetFailed = true;
  }
  showStatus(sheetFailed ? 'Falha ao enviar' : 'Relatório enviado com sucesso', sheetFailed ? 'error' : 'success');
  loadDiario();
  loadDashboard();
  renderFunilDash();
};

async function resetMetricasPeriod() {
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const fromISO = `${y}-${m}-01`;
  const toISO   = `${y}-${m}-${String(lastDay).padStart(2,'0')}`;
  document.getElementById('metricasFrom').value = fromISO;
  document.getElementById('metricasTo').value   = toISO;
  const rd = document.getElementById('metricasRangeDisplay');
  if (rd) rd.textContent = fromISO.split('-').reverse().join('/') + ' – ' + toISO.split('-').reverse().join('/');
  await loadMetricas();
}

async function loadMetricas() {
  const fromEl = document.getElementById('metricasFrom');
  const toEl   = document.getElementById('metricasTo');
  const fromVal = fromEl?.value || '';
  const toVal   = toEl?.value || '';

  let query = sb.from('diary_entries').select('*').eq('user_id', userSession.user.id);
  if (fromVal) query = query.gte('date', fromVal);
  if (toVal)   query = query.lte('date', toVal);

  const fmtISO = iso => iso ? iso.split('-').reverse().join('/') : '';
  const periodLabel = document.getElementById('metricasPeriodLabel');
  if (periodLabel) {
    periodLabel.textContent = fromVal && toVal ? `${fmtISO(fromVal)} → ${fmtISO(toVal)}` : fromVal ? `A partir de ${fmtISO(fromVal)}` : toVal ? `Até ${fmtISO(toVal)}` : 'Todos os registros';
  }

  const { data: diary } = await query;
  if (!diary || diary.length === 0) {
    ['metricasTotalContatos','metricasTotalAtendidas','metricasTotalDecisores','metricasTotalReunioes'].forEach(id => { document.getElementById(id).textContent='0'; });
    document.getElementById('metricasTaxaConversao').textContent='0%';
    document.getElementById('metricasTotalXP').textContent=userProfile.xp;
    const funnelEl = document.getElementById('metricasFunil');
    if (funnelEl) funnelEl.innerHTML = '<div class="empty-state"><div class="empty-state-text">Nenhum dado no período selecionado</div></div>';
    return;
  }
  let totalContatos=0, totalAtendidas=0, totalDecisores=0, totalReunioes=0;
  diary.forEach(d=>{ totalContatos+=d.contatos_tentados||0; totalAtendidas+=d.ligacoes_atendidas||0; totalDecisores+=d.conexao_decisor||0; totalReunioes+=d.reunioes_marcadas||0; });
  const pct = (a,b) => b>0 ? ((a/b)*100).toFixed(1)+'%' : '—';
  const taxaAB = pct(totalAtendidas, totalContatos);
  const taxaBD = pct(totalDecisores, totalAtendidas);
  const taxaDR = pct(totalReunioes, totalDecisores);
  const taxaGeral = pct(totalReunioes, totalContatos);
  const _taxa = taxaGeral;
  document.getElementById('metricasTotalContatos').textContent=totalContatos;
  document.getElementById('metricasTotalAtendidas').textContent=totalAtendidas;
  document.getElementById('metricasTotalDecisores').textContent=totalDecisores;
  document.getElementById('metricasTotalReunioes').textContent=totalReunioes;
  document.getElementById('metricasTaxaConversao').textContent=taxaGeral;
  const funnelEl = document.getElementById('metricasFunil');
  if(funnelEl) {
    const steps = [
      {label:'Contatos → Atendidas', pct:taxaAB, clr:'linear-gradient(90deg,#FFB800,#F5C518)'},
      {label:'Atendidas → Decisores', pct:taxaBD, clr:'linear-gradient(90deg,#6A6A7A,#A0A0B0)'},
      {label:'Decisores → Reuniões', pct:taxaDR, clr:'linear-gradient(90deg,#4A4A5A,#383848)'},
      {label:'Taxa Geral (Contatos→Reuniões)', pct:taxaGeral, clr:'linear-gradient(90deg,#383848,#F5C518)', bold:true},
    ];
        funnelEl.innerHTML = steps.map(function(s) {
      const pv = s.pct==='—' ? 0 : parseFloat(s.pct);
      const cls = s.bold ? 'funil-step funil-geral' : 'funil-step';
      const pctCls = s.bold ? 'funil-pct funil-pct-geral' : 'funil-pct';
      return '<div class="'+cls+'">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><div class="funil-label">'+s.label+'</div>'+(s.vol?'<span style="font-family:\'JetBrains Mono\',monospace;font-size:.92rem;color:#5A584E;font-weight:600">'+s.vol+'</span>':'')+' </div>'
        +'<div class="funil-bar-wrap"><div class="funil-bar" style="width:'+Math.min(pv,100)+'%;background:'+s.clr+'"></div></div>'
        +'<div class="'+pctCls+'">'+s.pct+'</div>'
        +'</div>';
    }).join('');
  }
  document.getElementById('metricasTotalXP').textContent=userProfile.xp;

// ══ FUNIL DASHBOARD ══
function renderDashFunil(contatos, atendente, decisor, reunioes) {
  const container = document.getElementById('dashFunil');
  if (!container) return;

  const taxaEl = document.getElementById('funilTaxaGeral');
  if (taxaEl) taxaEl.textContent = contatos > 0 ? Math.round((reunioes/contatos)*100)+'%' : '—';

  const steps = [
    { label:'Ligações Totais',     sub:'chamadas discadas',         value:contatos,  pct:100,                                          grad:'linear-gradient(135deg,#E8B84B 0%,#C99A2E 100%)' },
    { label:'Conexão Atendente',   sub:'atendimento confirmado',    value:atendente, pct: contatos>0?Math.round(atendente/contatos*100):0, grad:'linear-gradient(135deg,#D4A832 0%,#8B6A10 100%)' },
    { label:'Conexão Decisor',     sub:'tomador de decisão',        value:decisor,   pct: contatos>0?Math.round(decisor/contatos*100):0,   grad:'linear-gradient(135deg,#8B7BAE 0%,#3D3258 100%)' },
    { label:'Reuniões Marcadas',   sub:'objetivo conquistado',      value:reunioes,  pct: contatos>0?Math.round(reunioes/contatos*100):0,  grad:'linear-gradient(135deg,#34D399 0%,#059669 100%)' },
  ];

  const maxVal = contatos || 1;
  let html = '';
  steps.forEach((s, i) => {
    const widthPct = Math.max(35, 100 - (i * 16));
    const barW = contatos > 0 ? Math.round((s.value / maxVal) * 100) : 0;
    const isLast = i === steps.length - 1;
    const borderCol = isLast ? 'rgba(52,211,153,.25)' : 'rgba(232,184,75,.15)';
    html += `
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:${i<3?'0':'0'}px">
      <!-- funnel block -->
      <div style="
        width:${widthPct}%;
        background:${s.grad};
        border-radius:${i===0?'12px 12px 0 0': i===3?'0 0 12px 12px':'0'};
        padding:${i===0?'14px 16px 10px': i===3?'10px 16px 14px':'10px 16px'};
        position:relative;overflow:hidden;
        transition:filter .2s;
      " onmouseover="this.style.filter='brightness(1.12)'" onmouseout="this.style.filter=''">
        <!-- shimmer -->
        <div style="position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.25);border-radius:1px"></div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:.96rem;font-weight:800;color:rgba(255,255,255,.9);letter-spacing:.3px">${s.label}</div>
            <div style="font-size:.94rem;color:rgba(255,255,255,.55);margin-top:1px">${s.sub}</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:900;color:#fff;line-height:1">${s.value.toLocaleString('pt-BR')}</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:.94rem;color:rgba(255,255,255,.65)">${s.pct}%</div>
          </div>
        </div>
      </div>
      ${i < 3 ? `<div style="width:${widthPct-10}%;height:8px;clip-path:polygon(0 0,100% 0,90% 100%,10% 100%);background:${s.grad};opacity:.35"></div>` : ''}
    </div>`;
  });
  container.innerHTML = html;
}

window.toggleMissionLevelDropdown = function() {
  const menu = document.getElementById('missionLevelMenu');
  menu.classList.toggle('active');
  if (menu.classList.contains('active')) {
    const userLvl = getLevelInfo(userProfile?.xp || 0).level;
    let html = '';
    LEVELS.forEach(l => {
      const isLocked = l.level > userLvl;
      const isCurrent = l.level === userLvl;
      html += `<div class="level-dropdown-item ${isCurrent?'active':''} ${isLocked?'locked':''}" 
        onclick="${isLocked ? 'return false' : `selectMissionLevel(${l.level})`}">
        ${l.emoji || ''} Nível ${l.level} — ${l.name} ${isLocked ? '🔒' : ''}
      </div>`;
    });
    menu.innerHTML = html;
  }
};

window.selectMissionLevel = function(level) {
  const info = LEVELS.find(l => l.level === level);
  if (info) {
    document.getElementById('missionLevelLabel').textContent = `Nível ${level} — ${info.name}`;
    document.getElementById('missionLevelMenu').classList.remove('active');
    loadMissoes(level);
  }
};

function renderBadgesGridEnhanced() {
  const el = document.getElementById('badgesGrid');
  if (!el) return;

  document.getElementById('badgesYourXP').textContent = (userProfile?.xp || 0).toLocaleString('pt-BR') + ' XP';
  
  let html = '';
  for (let lvl = 1; lvl <= 7; lvl++) {
    const info = LEVEL_INFO[lvl];
    const isCurrent = lvl === userLvl;
    const isUnlocked = lvl <= userLvl;
    const isMystery = lvl >= 6;
    
    let cardClass = 'insignia-card';
    if (isCurrent) cardClass += ' current';
    else if (!isUnlocked && !isMystery) cardClass += ' locked';
    if (isMystery && !isUnlocked) { cardClass += ' mystery'; if (lvl === 7) cardClass += ' lvl7'; }
    
    html += `<div class="${cardClass}" style="padding:${isMystery && !isUnlocked ? '24px 16px' : '20px 16px'}">`;
    
    if (isMystery && !isUnlocked) {
      // Top-tier locked levels — badge visible but dimmed, info shown subtly
      const badgeImg = BADGE_IMGS[lvl] || '';
      if (badgeImg) {
        html += `<img src="${badgeImg}" style="width:88px;height:88px;object-fit:contain;display:block;margin:0 auto 10px;filter:grayscale(.5) brightness(.55) opacity(.65);" alt="N${lvl}">`;
      } else {
        html += `<div style="font-size:2.8rem;margin-bottom:10px;opacity:.6">${info.emoji}</div>`;
      }
      html += `<div style="font-size:.72rem;font-weight:800;color:rgba(245,197,24,.6);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">NÍVEL ${lvl}</div>`;
      html += `<div style="font-size:.82rem;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:10px">${info.name}</div>`;
      html += `<div style="padding:8px 10px;border-radius:8px;background:rgba(245,197,24,.04);border:1px solid rgba(245,197,24,.1);text-align:left;display:flex;flex-direction:column;gap:5px">`;
      html += `<div style="display:flex;align-items:flex-start;gap:5px"><span style="font-size:.64rem;font-weight:700;color:rgba(245,197,24,.45);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;min-width:56px">Comissão</span><span style="font-size:.66rem;color:rgba(255,255,255,.4);font-weight:600">${info.comissao}</span></div>`;
      html += `<div style="display:flex;align-items:flex-start;gap:5px"><span style="font-size:.64rem;font-weight:700;color:rgba(245,197,24,.45);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;min-width:56px">Meta</span><span style="font-size:.66rem;color:rgba(255,255,255,.4);font-weight:600">${info.meta}</span></div>`;
      html += `</div>`;
    } else {
      // Normal levels
      const badgeImg = BADGE_IMGS[lvl] || '';
      if (badgeImg) {
        html += `<img src="${badgeImg}" style="width:88px;height:88px;object-fit:contain;display:block;margin:0 auto 10px;${!isUnlocked?'filter:grayscale(.7) brightness(.4) opacity(.5);':'filter:drop-shadow(0 0 12px rgba(245,197,24,.35));'}" alt="N${lvl}">`;
      } else {
        html += `<div style="font-size:2.4rem;margin-bottom:10px">${info.emoji}</div>`;
      }
      
      html += `<div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px;color:${isCurrent?'var(--g1)':isUnlocked?'var(--t1)':'var(--t3)'}">Nível ${lvl}</div>`;
      html += `<div style="font-size:.85rem;font-weight:700;color:${isCurrent?'#EDD97A':isUnlocked?'var(--t1)':'var(--t3)'};margin-bottom:10px">${info.name}</div>`;
      
      // Level details
      html += `<div style="text-align:left;padding:10px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)">`;
      html += `<div style="font-size:.62rem;color:var(--t3);font-weight:600;margin-bottom:4px">COMISSÃO</div>`;
      html += `<div style="font-size:.72rem;color:${isUnlocked?'var(--g1)':'var(--t3)'};font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:8px">${info.comissao}</div>`;
      html += `<div style="font-size:.62rem;color:var(--t3);font-weight:600;margin-bottom:4px">META</div>`;
      html += `<div style="font-size:.72rem;color:${isUnlocked?'var(--t1)':'var(--t3)'};font-weight:600">${info.meta}</div>`;
      html += `</div>`;
      
      if (!isUnlocked) {
        html += `<div style="margin-top:8px;font-size:.62rem;color:#F87171;font-weight:700">🔒 Desbloqueie evoluindo</div>`;
      }
    }
    
    html += `</div>`;

}

// ══ DIÁRIO: Filtered history load ══
window.loadDiarioFiltered = async function() {
  const fromVal = document.getElementById('diarioFrom')?.value || '';
  const toVal = document.getElementById('diarioTo')?.value || '';
  
  let query = sb.from('diary_entries').select('*').eq('user_id', userSession.user.id).order('date', { ascending: false });
  if (fromVal) query = query.gte('date', fromVal);
  if (toVal) query = query.lte('date', toVal);
  
  const { data: diary } = await query;
  const container = document.getElementById('diarioHistorico');
  if (!diary || diary.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-text">Nenhum registro no período</div></div>';
    return;
  }
  let html = '<table class="table"><thead><tr><th>Data</th><th>Lig. Totais</th><th>Conexões</th><th>Cx. Decisor</th><th>Marc. Totais</th><th>Marc. SQL</th><th>Real. Totais</th><th>Real. SQL</th><th>Remarc.</th><th>No-Show</th></tr></thead><tbody>';
  diary.forEach(d => {
    html += `<tr><td>${new Date(d.date+'T12:00:00').toLocaleDateString('pt-BR')}</td><td>${d.contatos_tentados}</td><td>${d.ligacoes_atendidas}</td><td>${d.conexao_decisor}</td><td>${d.reunioes_marcadas}</td><td>${d.reunioes_marcadas_sql||0}</td><td>${d.reunioes_realizadas||0}</td><td>${d.reunioes_realizadas_sql||0}</td><td>${d.reunioes_remarcadas||0}</td><td>${d.no_show||0}</td></tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
};
