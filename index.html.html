<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUILDA — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0c;
  --bg-card: #16161b;
  --bg-input: #1c1c24;
  --gold: #c9a84c;
  --gold-light: #e0c76e;
  --gold-dim: #8a7235;
  --gold-glow: rgba(201,168,76,0.12);
  --text: #f0ece4;
  --text-secondary: #8a8a95;
  --text-muted: #55555f;
  --border: rgba(255,255,255,0.07);
  --border-gold: rgba(201,168,76,0.25);
  --red: #f87171;
  --green: #34d399;
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* BACKGROUND EFFECTS */
.bg-glow {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.bg-glow-1 {
  background: rgba(201,168,76,0.06);
  top: -200px; left: -200px;
}
.bg-glow-2 {
  background: rgba(96,165,250,0.04);
  bottom: -200px; right: -200px;
}

/* NOISE */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* GRID LINES */
.grid-lines {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}

.wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 440px;
  padding: 20px;
  animation: fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(32px); }
  to { opacity: 1; transform: translateY(0); }
}

/* LOGO */
.logo-area {
  text-align: center;
  margin-bottom: 36px;
}

.logo-shield {
  width: 56px; height: 56px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05));
  border: 1px solid var(--border-gold);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  box-shadow: 0 0 40px rgba(201,168,76,0.15);
}

.logo-area h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: 10px;
  color: var(--gold);
  text-shadow: 0 0 60px rgba(201,168,76,0.3);
  margin-bottom: 4px;
}

.logo-area .tagline {
  font-size: 0.65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* CARD */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

.tab.active {
  background: var(--gold-glow);
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.2);
}

/* FORM */
.form { display: flex; flex-direction: column; gap: 16px; }
.form-panel { display: none; }
.form-panel.active { display: flex; flex-direction: column; gap: 16px; }

.field { display: flex; flex-direction: column; gap: 7px; }

.field label {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
}

.field input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: all 0.2s;
  width: 100%;
}

.field input::placeholder { color: var(--text-muted); }

.field input:focus {
  border-color: var(--border-gold);
  background: rgba(201,168,76,0.04);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}

.field input.error {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(248,113,113,0.08);
}

/* FORGOT */
.forgot {
  text-align: right;
  font-size: 0.72rem;
  color: var(--gold-dim);
  cursor: pointer;
  margin-top: -8px;
  transition: color 0.2s;
}
.forgot:hover { color: var(--gold); }

/* BUTTON */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  border: none;
  border-radius: 10px;
  color: #0a0a0c;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  margin-top: 4px;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(201,168,76,0.3);
}

.btn-primary:active { transform: translateY(0); }

.btn-primary.loading {
  pointer-events: none;
  opacity: 0.7;
}

.btn-primary .btn-text { transition: opacity 0.2s; }
.btn-primary.loading .btn-text { opacity: 0; }

.spinner {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  border: 2px solid rgba(10,10,12,0.3);
  border-top-color: #0a0a0c;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  opacity: 0;
  transition: opacity 0.2s;
}
.btn-primary.loading .spinner { opacity: 1; }

@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

/* ALERT */
.alert {
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 0.8rem;
  display: none;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.5;
}

.alert.error {
  display: flex;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  color: var(--red);
}

.alert.success {
  display: flex;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.2);
  color: var(--green);
}

.alert.info {
  display: flex;
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold);
}

/* DIVIDER */
.divider {
  display: flex; align-items: center; gap: 12px;
  color: var(--text-muted); font-size: 0.7rem;
  text-transform: uppercase; letter-spacing: 1px;
  margin: 4px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

/* FOOTER NOTE */
.footer-note {
  text-align: center;
  margin-top: 20px;
  font-size: 0.72rem;
  color: var(--text-muted);
}

.footer-note span {
  color: var(--gold-dim);
  cursor: pointer;
  transition: color 0.2s;
}
.footer-note span:hover { color: var(--gold); }

/* PASSWORD STRENGTH */
.pw-strength {
  display: flex; gap: 4px; margin-top: 6px;
}
.pw-bar {
  flex: 1; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.08);
  transition: background 0.3s;
}
.pw-bar.weak { background: var(--red); }
.pw-bar.medium { background: #f59e0b; }
.pw-bar.strong { background: var(--green); }

/* NAME ROW */
.name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* RESET PANEL */
#resetPanel { display: none; }
#resetPanel.active { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="grid-lines"></div>

<div class="wrapper">

  <div class="logo-area">
    <div class="logo-shield">🛡️</div>
    <h1>GUILDA</h1>
    <div class="tagline">Sistema de Performance</div>
  </div>

  <!-- CARD NORMAL (LOGIN/CADASTRO) -->
  <div class="card" id="mainCard">

    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">Entrar</div>
      <div class="tab" id="tabRegister" onclick="switchTab('register')">Cadastrar</div>
    </div>

    <!-- ALERT GLOBAL -->
    <div class="alert" id="globalAlert"></div>

    <!-- LOGIN PANEL -->
    <div class="form-panel active" id="loginPanel">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="forgot" onclick="showReset()">Esqueci minha senha</div>
      <button class="btn-primary" id="btnLogin" onclick="handleLogin()">
        <span class="btn-text">ENTRAR NA GUILDA</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- REGISTER PANEL -->
    <div class="form-panel" id="registerPanel">
      <div class="name-row">
        <div class="field">
          <label>Nome</label>
          <input type="text" id="regFirstName" placeholder="Raul" autocomplete="given-name">
        </div>
        <div class="field">
          <label>Sobrenome</label>
          <input type="text" id="regLastName" placeholder="Costa" autocomplete="family-name">
        </div>
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="regPassword" placeholder="Mínimo 8 caracteres"
               autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
        <div class="pw-strength">
          <div class="pw-bar" id="pwBar1"></div>
          <div class="pw-bar" id="pwBar2"></div>
          <div class="pw-bar" id="pwBar3"></div>
          <div class="pw-bar" id="pwBar4"></div>
        </div>
      </div>
      <div class="field">
        <label>Confirmar Senha</label>
        <input type="password" id="regConfirm" placeholder="Repita a senha" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="btnRegister" onclick="handleRegister()">
        <span class="btn-text">CRIAR CONTA</span>
        <div class="spinner"></div>
      </button>
      <div class="footer-note" style="margin-top:0;">
        Cadastro apenas para membros convidados.<br>
        Dúvidas? Fale com <span>o administrador</span>.
      </div>
    </div>
  </div>

  <!-- RESET PASSWORD CARD -->
  <div class="card" id="resetCard" style="display:none;">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:2rem;margin-bottom:8px;">🔑</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;">Recuperar Senha</div>
      <div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">
        Enviaremos um link para o seu e-mail
      </div>
    </div>
    <div class="alert" id="resetAlert"></div>
    <div id="resetPanel" class="active">
      <div class="field">
        <label>E-mail cadastrado</label>
        <input type="email" id="resetEmail" placeholder="seu@email.com">
      </div>
      <button class="btn-primary" id="btnReset" onclick="handleReset()">
        <span class="btn-text">ENVIAR LINK</span>
        <div class="spinner"></div>
      </button>
      <div class="forgot" style="text-align:center;" onclick="hideReset()">← Voltar ao login</div>
    </div>
  </div>

  <div class="footer-note">
    GUILDA © 2026 · Área restrita a membros
  </div>

</div>

<script>
// ============================================================
// ⚙️ CONFIGURAÇÃO — substitua pelos seus dados do Supabase
// ============================================================
const SUPABASE_URL = 'https://rsittecjptwozwxlnfvy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-EsFNTHW8GRwFoJpK2EfEw_MF3msyPY';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Verifica se já está logado
sb.auth.getSession().then(({ data }) => {
  if (data.session) {
    redirectToDashboard();
  }
});

function redirectToDashboard() {
  window.location.href = 'dashboard.html';
}

// ---- TABS ----
function switchTab(tab) {
  clearAlert();
  document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
  document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
}

// ---- RESET CARD ----
function showReset() {
  document.getElementById('mainCard').style.display = 'none';
  document.getElementById('resetCard').style.display = 'block';
}

function hideReset() {
  document.getElementById('mainCard').style.display = 'block';
  document.getElementById('resetCard').style.display = 'none';
  clearAlert('resetAlert');
}

// ---- ALERTS ----
function showAlert(msg, type = 'error', id = 'globalAlert') {
  const el = document.getElementById(id);
  el.className = `alert ${type}`;
  el.innerHTML = `<span>${type === 'error' ? '⚠️' : type === 'success' ? '✓' : 'ℹ️'}</span><span>${msg}</span>`;
}

function clearAlert(id = 'globalAlert') {
  const el = document.getElementById(id);
  if (el) { el.className = 'alert'; el.innerHTML = ''; }
}

// ---- LOADING ----
function setLoading(btnId, loading) {
  document.getElementById(btnId).classList.toggle('loading', loading);
}

// ---- PASSWORD STRENGTH ----
function checkPasswordStrength(pw) {
  const bars = [1,2,3,4].map(i => document.getElementById(`pwBar${i}`));
  bars.forEach(b => { b.className = 'pw-bar'; });
  if (!pw) return;
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
  for (let i = 0; i < score; i++) bars[i].classList.add(cls);
}

// ---- FIELD VALIDATION ----
function validateField(id, condition, msg) {
  const el = document.getElementById(id);
  if (!condition) {
    el.classList.add('error');
    showAlert(msg);
    el.focus();
    return false;
  }
  el.classList.remove('error');
  return true;
}

// ---- LOGIN ----
async function handleLogin() {
  clearAlert();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!validateField('loginEmail', email.length > 0, 'Digite seu e-mail.')) return;
  if (!validateField('loginPassword', password.length > 0, 'Digite sua senha.')) return;

  setLoading('btnLogin', true);

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  setLoading('btnLogin', false);

  if (error) {
    const msg = error.message.includes('Invalid login')
      ? 'E-mail ou senha incorretos. Tente novamente.'
      : error.message.includes('Email not confirmed')
      ? 'Confirme seu e-mail antes de entrar. Verifique sua caixa de entrada.'
      : `Erro: ${error.message}`;
    showAlert(msg, 'error');
    return;
  }

  showAlert('Login realizado! Redirecionando...', 'success');
  setTimeout(redirectToDashboard, 800);
}

// ---- REGISTER ----
async function handleRegister() {
  clearAlert();
  const firstName = document.getElementById('regFirstName').value.trim();
  const lastName = document.getElementById('regLastName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;

  if (!validateField('regFirstName', firstName.length > 0, 'Digite seu nome.')) return;
  if (!validateField('regLastName', lastName.length > 0, 'Digite seu sobrenome.')) return;
  if (!validateField('regEmail', /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email), 'Digite um e-mail válido.')) return;
  if (!validateField('regPassword', password.length >= 8, 'A senha precisa ter pelo menos 8 caracteres.')) return;
  if (!validateField('regConfirm', password === confirm, 'As senhas não coincidem.')) return;

  setLoading('btnRegister', true);

  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: {
      data: {
        first_name: firstName,
        last_name: lastName,
        full_name: `${firstName} ${lastName}`,
        role: 'member',
        level: 1,
        xp: 0
      }
    }
  });

  setLoading('btnRegister', false);

  if (error) {
    const msg = error.message.includes('already registered')
      ? 'Este e-mail já possui cadastro. Faça login.'
      : `Erro: ${error.message}`;
    showAlert(msg, 'error');
    return;
  }

  showAlert('Conta criada! Verifique seu e-mail para confirmar o cadastro antes de entrar.', 'success');
  document.getElementById('registerPanel').style.opacity = '0.5';
  document.getElementById('registerPanel').style.pointerEvents = 'none';
}

// ---- RESET PASSWORD ----
async function handleReset() {
  clearAlert('resetAlert');
  const email = document.getElementById('resetEmail').value.trim();

  if (!email) {
    showAlert('Digite seu e-mail.', 'error', 'resetAlert');
    document.getElementById('resetEmail').classList.add('error');
    return;
  }

  setLoading('btnReset', true);

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: `${window.location.origin}/reset-password.html`
  });

  setLoading('btnReset', false);

  if (error) {
    showAlert(`Erro: ${error.message}`, 'error', 'resetAlert');
    return;
  }

  showAlert('Link enviado! Verifique seu e-mail.', 'success', 'resetAlert');
  document.getElementById('resetPanel').style.opacity = '0.5';
  document.getElementById('resetPanel').style.pointerEvents = 'none';
}

// ---- ENTER KEY ----
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const loginActive = document.getElementById('loginPanel').classList.contains('active');
  if (loginActive) handleLogin();
  else handleRegister();
});
</script>
</body>
</html>
