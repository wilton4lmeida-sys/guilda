<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUILDA — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --g1: #F5C518;
  --g2: #D4A017;
  --g3: #B8860B;
  --t1: #F0EEDD;
  --t2: #C8C4B0;
  --t3: #7A7868;
  --red: #F87171;
  --r: 18px;
  --rs: 12px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
html { font-size: 17px; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--t1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  background: #06050a;
}

/* ── FUNDO GRADIENTE MAIS PRESENTE ── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 90% 70% at 0% 0%, rgba(210,155,5,.18) 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 100% 100%, rgba(110,60,180,.22) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(30,20,50,.5) 0%, transparent 70%),
    linear-gradient(150deg, #0c0a14 0%, #06050a 40%, #0e0a18 100%);
}

/* orb dourado topo esq — mais visível */
.orb-gold {
  position: fixed;
  width: 900px; height: 600px;
  top: -300px; left: -300px;
  background: radial-gradient(ellipse, rgba(245,190,10,.16) 0%, transparent 60%);
  filter: blur(50px);
  pointer-events: none; z-index: 1;
}

/* orb roxo baixo dir — mais visível */
.orb-purple {
  position: fixed;
  width: 900px; height: 600px;
  bottom: -300px; right: -300px;
  background: radial-gradient(ellipse, rgba(120,60,200,.2) 0%, transparent 60%);
  filter: blur(60px);
  pointer-events: none; z-index: 1;
}

/* orb gold centro suave */
.orb-mid {
  position: fixed;
  width: 500px; height: 400px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: radial-gradient(ellipse, rgba(200,140,0,.06) 0%, transparent 65%);
  filter: blur(60px);
  pointer-events: none; z-index: 1;
}

/* ── CONTAINER ── */
.container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 420px;
  padding: 24px;
}

/* ── LOGO ── */
.logo {
  text-align: center;
  margin-bottom: 0;
}

.logo-img {
  width: 86px;
  height: 86px;
  object-fit: contain;
  animation: logoGlow 3.5s ease-in-out infinite alternate;
}

@keyframes logoGlow {
  from { filter: drop-shadow(0 0 8px rgba(245,197,24,.4)) drop-shadow(0 0 20px rgba(245,197,24,.2)); }
  to   { filter: drop-shadow(0 0 18px rgba(245,197,24,.7)) drop-shadow(0 0 40px rgba(245,197,24,.35)); }
}

/* ── WELCOME ── */
.welcome {
  text-align: center;
  margin-bottom: 22px;
}

.welcome-title {
  font-size: 1.45rem;
  font-weight: 800;
  color: #F0EEDD;
  letter-spacing: .5px;
  line-height: 1.3;
  text-shadow: 0 0 40px rgba(245,197,24,.25), 0 2px 12px rgba(0,0,0,.6);
}

.welcome-title span {
  color: var(--g1);
}

/* ── CARD — mais contrastado ── */
.card {
  background: rgba(16,14,24,.92);
  backdrop-filter: blur(32px);
  border: 1px solid rgba(245,197,24,.18);
  border-radius: var(--r);
  padding: 38px 34px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(245,197,24,.07),
    0 32px 80px rgba(0,0,0,.65),
    inset 0 1px 0 rgba(255,255,255,.06);
}

/* gold top line mais brilhante */
.card::before {
  content: '';
  position: absolute; top: 0; left: 14px; right: 14px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--g1) 30%, #FFD740 50%, var(--g2) 70%, transparent);
  border-radius: 2px;
}

/* glow dourado difuso embaixo da top line */
.card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(180deg, rgba(245,197,24,.06) 0%, transparent 100%);
  pointer-events: none;
}

.card-eyebrow {
  font-size: .78rem;
  font-weight: 500;
  text-transform: none;
  letter-spacing: .3px;
  color: rgba(176,174,158,.65);
  margin-bottom: 28px;
  text-align: center;
  position: relative; z-index: 1;
}

/* ── FORM ── */
.form-group { margin-bottom: 22px; position: relative; z-index: 1; }

label {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  color: rgba(200,196,176,.75);
  margin-bottom: 9px;
  text-transform: uppercase;
  letter-spacing: 1.4px;
}

input {
  width: 100%;
  padding: 15px 18px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: var(--rs);
  color: #F4F0E4;
  font-size: 0.92rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all 0.25s;
}

input:focus {
  outline: none;
  border-color: rgba(245,197,24,.6);
  box-shadow: 0 0 0 3px rgba(245,197,24,.12), inset 0 0 0 1px rgba(245,197,24,.1);
  background: rgba(245,197,24,.04);
}

input::placeholder { color: rgba(120,118,104,.7); }

/* ── BUTTON ── */
.btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #FFD740 0%, #F5C518 30%, #D4A017 65%, #B8860B 100%);
  border: none;
  border-radius: var(--rs);
  color: #07060a;
  font-size: 0.82rem;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Plus Jakarta Sans', sans-serif;
  margin-top: 12px;
  box-shadow:
    0 4px 20px rgba(245,197,24,.3),
    0 1px 0 rgba(255,255,255,.2) inset;
  position: relative; z-index: 1;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(245,197,24,.45);
  background: linear-gradient(135deg, #FFE060 0%, #F5C518 30%, #D4A017 65%, #B8860B 100%);
}
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── ERROR ── */
.error {
  background: rgba(248,113,113,.1);
  border: 1px solid rgba(248,113,113,.25);
  color: var(--red);
  padding: 12px 16px;
  border-radius: var(--rs);
  font-size: 0.8rem;
  font-weight: 500;
  margin-bottom: 20px;
  display: none;
  position: relative; z-index: 1;
}
.error.show { display: block; }

/* ── FOOTER ── */
.footer {
  text-align: center;
  margin-top: 26px;
  font-size: 0.68rem;
  color: rgba(180,170,140,.65);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
</style>
</head>

  <div class="welcome">
    <div class="welcome-title">Bem-vindo de volta à <span>Guilda</span></div>
  </div>

  <div class="card">
    <div class="card-eyebrow">Informe seu login e senha para ter acesso</div>
    <div id="error" class="error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Usuário</label>
        <input type="text" id="email" placeholder="seu usuário" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">Entrar</button>
    </form>
  </div>

  <div class="footer">Grupo Rugido · 2026</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SUPABASE_URL = 'https://rsittecjptwozwxlnfvy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzaXR0ZWNqcHR3b3p3eGxuZnZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Nzc5MTQsImV4cCI6MjA4ODI1MzkxNH0.E0wFpLYcAAzLXqMUWGFHMmTBjC0dB6zC9XJsl5caji8';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

async function checkSession() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const { data: profile } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
      if (profile) window.location.href = profile.role === 'admin' ? 'painel-mestre.html' : 'dashboard.html';
    }
  } catch(e) {}
}
checkSession();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('email').value.trim().toLowerCase();
  const email = username + '@guilda.local';
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('error');
  const submitBtn = document.getElementById('submitBtn');
  errorDiv.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Entrando...';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
    window.location.href = (profile && profile.role === 'admin') ? 'painel-mestre.html' : 'dashboard.html';
  } catch (err) {
    errorDiv.textContent = err.message === 'Invalid login credentials' ? 'Usuário ou senha incorretos' : err.message;
    errorDiv.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Entrar';
  }
});
</script>
